[project]
name = "sbi_compression"
authors = [
    {name = "Brian Chiang", email = "brianchiangycc@gmail.com"}
]
version = "0.1.0"
description = "Euclidean and spherical compression for SBI"
readme = "README.md"
requires-python = "==3.12.13"
dependencies = [
    "distrax>=0.1.5",
    "equinox>=0.13.8",
    "flax==0.8.3",
    "getdist>=1.7.7",
    "ipykernel>=7.2.0",
    "jax<=0.4.38", # jax supports numpy release for 24 months since release, numpy 1.26.4 was released in 2024-02-06, so it will be supported until 2026-02-06 
    "matplotlib>=3.10.9",
    "numpy>=2.3.0",
    #"numpy==1.26.4",
    "numpyro",
    "optax<=0.2.2",
    "sbi>=0.26.1",
    "seaborn>=0.13.2",
    "torch>=2.12.0",
    "tqdm>=4.67.3",
    "s2ai @ git+https://github.com/astro-informatics/s2ai.git",
]

[project.optional-dependencies]
ml = [
    "scipy>=1.16",
    "PyYAML",
]
dev = [
    "pytest>=8.0",
]
docs = [
    "sphinx",
]

[project.scripts]
sbi_compression = "sbi_compression.cli:main"

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
include = ["sbi_compression*"]
exclude = ["tests*", "docs*"]

[tool.uv]
override-dependencies = ["numpy>=2.3.0"]

